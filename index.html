<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Redirecting...</title>
  <link rel="alternate" hreflang="en" href="https://japanprivateguide.com/en" />
  <link rel="alternate" hreflang="ja" href="https://japanprivateguide.com/login" />

  <link rel="shortcut icon" href="favicon.ico">

  <script async data-id="101494630" src="//static.getclicky.com/js"></script>

  <script>
    (function () {
      const lang = (navigator.language || "").toLowerCase();

      if (lang.startsWith("ja")) {
        window.location.replace("/login");
      } else {
        window.location.replace("/en");
      }
    })();
  </script>

</head>

<body>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/en">
  </noscript>
</body>
</html>
